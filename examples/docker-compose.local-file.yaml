services:
  rclone-rc:
    image: rclone/rclone:latest
    container_name: rclone-rc-in-rclone-rc-local-file-example
    command:
      - rcd
      - --rc-addr=:5572
      - --rc-no-auth
      - --rc-allow-origin=${RC_ALLOW_ORIGIN}
      - --rc-files=/data
      - --log-level=DEBUG
      - --log-file=/logs/rclone.log
    ports:
      - "5572:5572"
    volumes:
      - ./rclone-config/local-file:/config/rclone
      - ./data:/data
      - ./logs:/logs
    environment:
      - RCLONE_CONFIG=/config/rclone/rclone.conf
    restart: unless-stopped

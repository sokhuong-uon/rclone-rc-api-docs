            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /pluginsctl/removeTestPlugin:
    post:
      operationId: pluginsctl_removeTestPlugin
      tags:
        - Plugins
      summary: Remove a test plugin
      description: >-
        Removes a test plugin by name. The plugin files are deleted from disk
        and it will no longer be available for testing. Use
        pluginsctl/listTestPlugins to find the exact plugin name.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
              required:
                - name
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /debug/set-block-profile-rate:
    post:
      operationId: debug_set-block-profile-rate
      tags:
        - Debug
      summary: Set block profile rate
      description: >-
        Sets the Go runtime block profile rate, which controls how frequently
        blocking events (like mutex waits and channel operations) are recorded in
        profiles. Set to 0 to disable, or a positive number for the sampling rate
        in nanoseconds. Intended for advanced performance debugging.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rate:
                  type: integer
              required:
                - rate
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /debug/set-gc-percent:
    post:
      operationId: debug_set-gc-percent
      tags:
        - Debug
      summary: Set GC percentage
      description: >-
        Sets the Go garbage collector target percentage. A value of 100 (the
        default) means GC runs when the heap doubles in size. Lower values trigger
        GC more often (using less memory but more CPU), higher values trigger it
        less often. Set to -1 to disable automatic GC entirely.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                gc-percent:
                  type: integer
              required:
                - gc-percent
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /debug/set-mutex-profile-fraction:
    post:
      operationId: debug_set-mutex-profile-fraction
      tags:
        - Debug
      summary: Set mutex profile fraction
      description: >-
        Sets the fraction of mutex contention events that are reported in the
        mutex profile. Set to 0 to disable, or a positive number N to report 1/N
        of all events. Returns the previous rate. Intended for diagnosing lock
        contention issues in advanced debugging scenarios.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rate:
                  type: integer
              required:
                - rate
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  previousRate:
                    type: integer
              examples:
                - previousRate: 0
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /debug/set-soft-memory-limit:
    post:
      operationId: debug_set-soft-memory-limit
      tags:
        - Debug
      summary: Set soft memory limit
      description: >-
        Sets the Go runtime soft memory limit in bytes. When memory usage
        approaches this limit, the garbage collector will run more aggressively
        to try to stay under it. This is a soft limit — rclone may briefly exceed
        it. Useful for constraining rclone memory usage on shared or
        resource-limited systems.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                mem-limit:
                  type: integer
                  examples:
                    - 1073741824
              required:
                - mem-limit
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

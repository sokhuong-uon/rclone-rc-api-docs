openapi: 3.1.0
info:
  title: Rclone RC API
  version: "1.40"
  description: >-
    The Rclone RC (Remote Control) API lets you control rclone over HTTP.
    You can manage cloud remotes, copy/sync files, mount filesystems, and
    monitor transfers — all from your own code, scripts, or tools.


    ## What can you do with it?


    - **Manage remotes** — create, update, delete cloud storage configs
    (Google Drive, S3, SFTP, etc.)

    - **Transfer files** — copy, move, sync, or delete files between any
    two remotes (or local disk)

    - **Mount remotes** — mount cloud storage as a local drive

    - **Monitor progress** — track transfer speeds, check job status, view
    errors

    - **Run any rclone command** — execute CLI commands programmatically
    via `core/command`


    ---


    ## Quick Start


    ### 1. Start the rclone RC server


    ```bash

    rclone rcd --rc-no-auth

    ```


    This starts rclone listening on `http://localhost:5572`. The `--rc-no-auth`
    flag disables authentication (fine for local development, but **never use
    this in production**).


    ### 2. Test the connection


    ```bash

    curl -X POST http://localhost:5572/rc/noop -d '{"hello":"world"}'

    ```


    You should get back: `{"hello":"world"}`. If you see this, the server
    is running.


    ### 3. Try a real command


    ```bash

    # List files in a local directory

    curl -X POST http://localhost:5572/operations/list \
      -H "Content-Type: application/json" \
      -d '{"fs":"/tmp", "remote":""}'

    ```


    ### Common startup options


    ```bash

    # With authentication (recommended for anything non-local)

    rclone rcd --rc-user=admin --rc-pass=secret


    # On a custom port

    rclone rcd --rc-addr=:8080 --rc-no-auth


    # With the web GUI

    rclone rcd --rc-web-gui --rc-no-auth


    # Allow cross-origin requests (for browser-based apps)

    rclone rcd --rc-no-auth --rc-allow-origin='http://localhost:5173'


    # If you want to test requests from this live docs

    rclone rcd --rc-no-auth --rc-allow-origin='https://rclone-rc-api.cloudnrain.com'

    ```


    ---


    ## Authentication


    Rclone protects endpoints that access remotes (file operations, config
    changes, etc.) behind authentication by default. Endpoints marked with
    a lock icon in this documentation require auth when it is enabled.


    **Options:**


    | Flag | What it does |

    |------|-------------|

    | `--rc-user` / `--rc-pass` | Set a username and password (HTTP Basic
    Auth) |

    | `--rc-htpasswd` | Use an htpasswd file for multiple users |

    | `--rc-no-auth` | Turn off auth entirely (local dev only!) |


    When auth is enabled, pass credentials via HTTP Basic Auth:


    ```bash

    curl -u admin:secret -X POST http://localhost:5572/config/listremotes

    ```


    Without valid credentials, protected endpoints return **403 Forbidden**.


    ---


    ## How to send requests


    Every endpoint uses **POST**. You can send parameters three ways:


    **JSON body (recommended):**

    ```bash

    curl -X POST http://localhost:5572/operations/list \
      -H "Content-Type: application/json" \
      -d '{"fs":"/tmp", "remote":"", "opt":{"showHash":true}}'

    ```


    **URL query parameters:**

    ```bash

    curl -X POST 'http://localhost:5572/rc/noop?param1=one&param2=two'

    ```


    **Form data:**

    ```bash

    curl -X POST http://localhost:5572/rc/noop -d param1=one -d param2=two

    ```


    If you mix methods, JSON body wins, then form data, then query params.


    ---


    ## Specifying remotes


    The `fs`, `srcFs`, and `dstFs` parameters identify which storage to
    operate on. You can pass them as:


    - **A remote path string:** `"drive:documents"`, `"s3:my-bucket/prefix"`,
    `"/local/path"`

    - **A JSON config object** (for on-the-fly remote configuration):


    ```json

    {"type": "s3", "provider": "AWS", "region": "us-east-1", "_root":
    "/my-bucket"}

    ```


    Special keys in JSON config: `type` (backend type), `_name` (named
    remote), `_root` (root path).


    ---


    ## Running long operations in the background


    File transfers and syncs can take a long time. Add `"_async": true` to
    run them in the background:


    ```bash

    # Start a copy in the background

    curl -X POST http://localhost:5572/sync/copy \
      -H "Content-Type: application/json" \
      -d '{"srcFs":"drive:docs", "dstFs":"/backup/docs", "_async":true}'

    # Response: {"jobid": 1, "executeId": "abc-123"}


    # Check progress

    curl -X POST http://localhost:5572/job/status \
      -H "Content-Type: application/json" \
      -d '{"jobid": 1}'

    ```


    Use `job/list` to see all jobs, and `job/stop` to cancel one.


    ---


    ## Special parameters


    These underscore-prefixed parameters work on every endpoint:


    | Parameter | Type | Description |

    |-----------|------|-------------|

    | `_async` | boolean | Run in the background. Returns `jobid` immediately
    instead of waiting. |

    | `_group` | string | Group this call's stats under a custom name (default:
    `job/{id}`). |

    | `_config` | object | Override global rclone flags for this call only
    (e.g. `{"CheckSum": true}`). |

    | `_filter` | object | Apply file filters for this call only (e.g.
    `{"MaxSize": "100M", "IncludeRule": ["*.jpg"]}`). |


    ---


    ## Error handling


    When something goes wrong, the API returns a non-2xx HTTP status code
    with a JSON error body:


    ```json

    {
      "error": "Didn't find key \"fs\" in input",
      "input": {},
      "status": 400,
      "path": "operations/list"
    }

    ```


    **Common error codes:**


    | Code | Meaning | Common causes |

    |------|---------|---------------|

    | 400 | Bad Request | Missing required parameter, malformed JSON |

    | 403 | Forbidden | Auth is enabled but credentials are missing or
    wrong |

    | 404 | Not Found | The endpoint doesn't exist |

    | 500 | Internal Error | Invalid remote name, backend error, resource
    not found |


    ---


    ## Data types


    Some values have flexible types:


    - **Duration** — returned as nanoseconds (integer), but you can set
    them as strings like `"5s"`, `"1h30m"`

    - **Size** — returned as bytes (integer), but you can set them as strings
    like `"100M"`, `"1G"`

    - **Enums** — returned as integers, but you can set them as strings
    (e.g. `"full"` for VFS cache mode instead of `3`)
  contact:
    name: Rclone Community
    url: https://rclone.org
  license:
    name: MIT
    url: https://github.com/rclone/rclone/blob/master/COPYING
externalDocs:
  description: Official Rclone RC Documentation
  url: https://rclone.org/rc/
servers:
  - url: http://localhost:5572
    description: Default local rclone RC server
  - url: http://localhost:{port}
    description: Custom port
    variables:
      port:
        default: "5572"
  - url: https://{host}:{port}
    description: Custom domain and port
    variables:
      host:
        default: example.com
      port:
        default: "5572"
tags:
  - name: RC
    description: >-
      Utility endpoints for testing connectivity and discovering available commands.
      Use these to verify your rclone RC server is reachable, test authentication,
      and list all registered RC commands.
  - name: Core
    description: >-
      Core system operations for monitoring and controlling the rclone process itself.
      Includes version info, memory stats, bandwidth limits, transfer statistics,
      process control, and garbage collection.
  - name: Config
    description: >-
      Manage rclone remote configurations programmatically. Create, read, update, and
      delete remotes, list available storage providers, and manage config file paths
      and encryption.
  - name: Operations
    description: >-
      File and directory operations on remotes. List, copy, move, delete, create
      directories, stat files, upload, calculate hashes, check integrity, and more.
      These are the primary endpoints for interacting with files on your remotes.
  - name: Sync
    description: >-
      Synchronization operations for copying, moving, and syncing files between remotes.
      Includes one-way sync, bidirectional sync (bisync), and bulk move operations.
      These are typically long-running and best used with _async=true.
  - name: Mount
    description: >-
      Mount and unmount remote filesystems to local directories via FUSE. Once mounted,
      remote files appear as local files and can be accessed by any application.
      Requires FUSE support on the host system.
  - name: VFS
    description: >-
      Virtual File System (VFS) operations for managing the caching layer used by
      mounts and serves. Refresh directory caches, manage the upload queue, configure
      poll intervals, and view VFS statistics.
  - name: Job
    description: >-
      Manage asynchronous jobs created by passing _async=true to other endpoints.
      List running and finished jobs, check job status and progress, stop jobs,
      and execute batch commands.
  - name: Serve
    description: >-
      Start and stop file servers that expose remotes over various protocols including
      HTTP, WebDAV, FTP, SFTP, NFS, DLNA, and S3. Useful for sharing files or
      integrating with other tools that speak these protocols.
  - name: Options
    description: >-
      Read and modify global rclone options at runtime without restarting the process.
      Useful for changing filters, transfer settings, or other configuration on the fly.
  - name: Cache
    description: >-
      Operations for the cache backend (cache remote type). Expire cached entries,
      pre-fetch file chunks, and view cache statistics. Only relevant if you are
      using a cache remote.
  - name: Backend
    description: >-
      Execute backend-specific commands that are unique to a particular remote type.
      For example, Google Drive has commands for recovering files from trash, while
      S3 has commands for managing object versions.
  - name: FsCache
    description: >-
      Manage the internal filesystem object cache that rclone uses to avoid
      re-creating filesystem objects. Clear the cache or check how many entries
      it holds.
  - name: Plugins
    description: >-
      Manage web GUI plugins for the rclone dashboard. Add, remove, and list plugins
      that extend the rclone web interface with custom functionality.
  - name: Debug
    description: >-
      Advanced debugging and profiling endpoints for tuning Go runtime behavior.
      Set memory limits, GC percentages, and profiling rates. Intended for
      developers and advanced troubleshooting.
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: HTTP Basic Authentication using --rc-user and --rc-pass credentials.
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          examples:
            - remote not found
        input:
          type: object
        status:
          type: integer
          examples:
            - 500
        path:
          type: string
          examples:
            - operations/list
    BadRequestResponse:
      type: object
      properties:
        error:
          type: string
          examples:
            - 'Didn''t find key "fs" in input'
        input:
          type: object
        status:
          type: integer
          examples:
            - 400
        path:
          type: string
          examples:
            - operations/list
    ForbiddenResponse:
      type: object
      properties:
        error:
          type: string
          examples:
            - authentication must be set up on the rc server to use this method
        input:
          type: object
        status:
          type: integer
          examples:
            - 403
        path:
          type: string
          examples:
            - rc/noopauth
    AsyncResponse:
      type: object
      properties:
        jobid:
          type: integer
          examples:
            - 1
        executeId:
          type: string
    VersionInfo:
      type: object
      properties:
        version:
          type: string
          examples:
            - v1.73.2
        decomposed:
          type: array
          items:
            type: integer
        isGit:
          type: boolean
        isBeta:
          type: boolean
        os:
          type: string
          examples:
            - linux
        osKernel:
          type: string
          examples:
            - "6.8.0-86-generic (x86_64)"
        osVersion:
          type: string
          examples:
            - ubuntu 24.04 (64 bit)
        osArch:
          type: string
          examples:
            - arm64 (ARMv8 compatible)
        arch:
          type: string
          examples:
            - arm64
        goVersion:
          type: string
          examples:
            - go1.26.1
        linking:
          type: string
          examples:
            - static
        goTags:
          type: string
          examples:
            - none
    BandwidthLimit:
      type: object
      properties:
        bytesPerSecond:
          type: integer
          examples:
            - 1048576
        bytesPerSecondTx:
          type: integer
        bytesPerSecondRx:
          type: integer
        rate:
          type: string
          examples:
            - 1M
    ListItem:
      type: object
      properties:
        Path:
          type: string
          examples:
            - documents/report.pdf
        Name:
          type: string
          examples:
            - report.pdf
        Size:
          type: integer
          examples:
            - 1048576
        MimeType:
          type: string
          examples:
            - application/pdf
        ModTime:
          type: string
          format: date-time
        IsDir:
          type: boolean
        Hashes:
          type: object
          additionalProperties:
            type: string
        ID:
          type: string
        Metadata:
          type: object
    ListOptions:
      type: object
      properties:
        recurse:
          type: boolean
          default: false
        noModTime:
          type: boolean
          default: false
        showEncrypted:
          type: boolean
          default: false
        showOrigIDs:
          type: boolean
          default: false
        showHash:
          type: boolean
          default: false
        noMimeType:
          type: boolean
          default: false
        dirsOnly:
          type: boolean
          default: false
        filesOnly:
          type: boolean
          default: false
        metadata:
          type: boolean
          default: false
        hashTypes:
          type: array
          items:
            type: string
    JobStatus:
      type: object
      properties:
        finished:
          type: boolean
        duration:
          type: number
        endTime:
          type: string
          format: date-time
        startTime:
          type: string
          format: date-time
        error:
          type: string
        id:
          type: integer
        success:
          type: boolean
        output:
          type: object
        progress:
          type: object
        executeId:
          type: string
          description: "Rclone instance ID. Changes after restart."
        group:
          type: string
          description: "Stats group name for this job."
    TransferStats:
      type: object
      properties:
        bytes:
          type: integer
        checks:
          type: integer
        deletes:
          type: integer
        deletedDirs:
          type: integer
        elapsedTime:
          type: number
        errors:
          type: integer
        eta:
          type: integer
          nullable: true
          description: Estimated seconds until group completes, or null if unknown.
        fatalError:
          type: boolean
        lastError:
          type: string
        listed:
          type: integer
        renames:
          type: integer
        retryError:
          type: boolean
        serverSideCopies:
          type: integer
        serverSideCopyBytes:
          type: integer
        serverSideMoves:
          type: integer
        serverSideMoveBytes:
          type: integer
        speed:
          type: number
        totalBytes:
          type: integer
        totalChecks:
          type: integer
        totalTransfers:
          type: integer
        transferTime:
          type: number
        transfers:
          type: integer
        transferring:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              size:
                type: integer
              bytes:
                type: integer
              percentage:
                type: number
              speed:
                type: number
              speedAvg:
                type: number
              eta:
                type: integer
                nullable: true
        checking:
          type: array
          items:
            type: string
    MountOptions:
      type: object
      properties:
        AllowOther:
          type: boolean
        AllowNonEmpty:
          type: boolean
        AllowRoot:
          type: boolean
        DefaultPermissions:
          type: boolean
    VfsOptions:
      type: object
      properties:
        CacheMode:
          type: integer
          enum:
            - 0
            - 1
            - 2
            - 3
          default: 0
        CacheMaxAge:
          type: string
          examples:
            - 1h0m0s
        CacheMaxSize:
          type: string
          examples:
            - 10G
        ReadAhead:
          type: string
          examples:
            - 128k
    ServeInfo:
      type: object
      properties:
        id:
          type: string
          examples:
            - nfs-ecfc6852
        addr:
          type: string
          examples:
            - "[::]:4321"
        params:
          type: object
    ConfigPaths:
      type: object
      properties:
        cache:
          type: string
          examples:
            - /home/user/.cache/rclone
        config:
          type: string
          examples:
            - /home/user/.config/rclone/rclone.conf
        temp:
          type: string
          examples:
            - /tmp
    OptionExample:
      type: object
      description: A predefined value that can be selected from a list.
      properties:
        Value:
          type: string
          description: The example value.
        Help:
          type: string
          description: Help text for this example value.
    OptionInfo:
      type: object
      description: >-
        Describes a single rclone configuration option. Used by options/info
        (for main config) and config/providers (for backend config) to expose
        option metadata for building UIs.
      required:
        - Name
        - FieldName
        - Help
        - Default
        - Value
        - Hide
        - Required
        - IsPassword
        - NoPrefix
        - Advanced
        - Exclusive
        - Sensitive
      properties:
        Name:
          type: string
          description: >-
            Name of the option in snake_case. Becomes the command line flag
            with underscores replaced by hyphens.
          examples:
            - log_level
        FieldName:
          type: string
          description: >-
            Name of the field used in the RC. If blank, use Name. May contain
            "." for nested fields.
          examples:
            - LogLevel
        Help:
          type: string
          description: >-
            Help text. Starts with a single sentence on a single line. May be
            multiple lines separated by newline characters.
          examples:
            - "Log level DEBUG|INFO|NOTICE|ERROR"
        Groups:
          type: string
          description: >-
            Groups this option belongs to, as a comma-separated string for
            option classification.
          examples:
            - Logging
        Provider:
          type: string
          description: Set to filter on provider.
        Default:
          description: >-
            Default value for this option. The type varies depending on the
            option (string, number, boolean, array, object, or null).
          examples:
            - 5
        Value:
          description: >-
            Current value of this option. Null if not explicitly set (the
            default is used).
          nullable: true
          examples:
            - null
        Examples:
          type: array
          description: >-
            Predefined values that can be selected from a list
            (multiple-choice option).
          items:
            $ref: "#/components/schemas/OptionExample"
        ShortOpt:
          type: string
          description: The short (single-character) command line option for this.
          examples:
            - P
        Hide:
          type: integer
          description: >-
            Visibility bitmask. If non-zero, this option is hidden from the
            configurator (1) or the command line (2), or both (3).
          examples:
            - 0
        Required:
          type: boolean
          description: >-
            Whether this option is required, meaning value cannot be empty
            unless there is a Default set.
          examples:
            - false
        IsPassword:
          type: boolean
          description: Set if the option is a password.
          examples:
            - false
        NoPrefix:
          type: boolean
          description: Set if the option should not use the backend prefix.
          examples:
            - true
        Advanced:
          type: boolean
          description: Set if this is an advanced config option.
          examples:
            - false
        Exclusive:
          type: boolean
          description: >-
            Set if the answer can only be one of the Examples values (empty
            string allowed unless Required or Default is set).
          examples:
            - false
        Sensitive:
          type: boolean
          description: Set if this option should be redacted when using rclone config redacted.
          examples:
            - false
        DefaultStr:
          type: string
          description: Human-readable string representation of the Default value.
          examples:
            - "NOTICE"
        ValueStr:
          type: string
          description: Human-readable string representation of the current Value.
          examples:
            - "NOTICE"
        Type:
          type: string
          description: >-
            The type of this option (e.g. string, bool, int, Duration,
            SizeSuffix, LogLevel, FileMode, etc.).
          examples:
            - LogLevel
paths:
  /rc/noop:
    post:
      operationId: rc_noop
      tags:
        - RC
      summary: Echo parameters (no auth)
      description: >-
        Echoes back all input parameters exactly as received. Use this to verify
        that your rclone RC server is running and reachable. Does not require
        authentication, making it ideal as a connectivity health check.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                param1:
                  type: string
                param2:
                  type: string
            example:
              - param1: one
                param2: two
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
              examples:
                - param1: one
                  param2: two
  /rc/noopauth:
    post:
      operationId: rc_noopauth
      tags:
        - RC
      summary: Echo parameters (requires auth)
      description: >-
        Echoes back all input parameters, but requires valid authentication
        credentials. Use this to verify that both connectivity and authentication
        are working correctly before making other authenticated API calls.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                test:
                  type: string
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                examples:
                  - greeting: "Hello auth"
        "401":
          description: Unauthorized.
          content:
            text/plain:
              schema:
                type: string
                examples:
                  - "401 Unauthorized"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    const: 'authentication must be set up on the rc server to use \"rc/noopauth\" or the --rc-no-auth flag must be in use'
                  input:
                    type: object
                    examples:
                      - greeting: "Hi there"
                      - data: "Hmm!"
                  path:
                    type: string
                    const: "rc/noopauth"
                  status:
                    type: integer
                    const: 403
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /rc/list:
    post:
      operationId: rc_list
      tags:
        - RC
      summary: List all available RC commands
      description: >-
        Returns a JSON object listing all registered RC commands along with their
        descriptions. Use this to discover which endpoints are available on your
        rclone version, since available commands can vary depending on the build
        and loaded backends.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  commands:
                    type: array
                    items:
                      type: object
                      properties:
                        Path:
                          type: string
                          examples:
                            - "backend/command"
                        Title:
                          type: string
                          examples:
                            - "Runs a backend command."
                        AuthRequired:
                          type: boolean
                        Help:
                          type: string
                        NeedsRequest:
                          type: boolean
                        NeedsResponse:
                          type: boolean
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /rc/error:
    post:
      operationId: rc_error
      tags:
        - RC
      summary: Return an error (testing)
      description: >-
        Always returns a non-fatal error response. Use this to test how your
        application handles error responses from the RC API. The error returned
        is intentional and does not indicate a real problem.
      responses:
        "500":
          description: Always returns a 500 error for testing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                - error: "arbitrary error on input map[]"
                  input: {}
                  path: "rc/error"
                  status: 500
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /rc/fatal:
    post:
      operationId: rc_fatal
      tags:
        - RC
      summary: Return a fatal error (testing)
      description: >-
        Always returns a fatal error response. Use this to test how your application
        handles fatal (unrecoverable) errors from the RC API. Unlike rc/error, a fatal
        error typically indicates a condition where the operation cannot be retried.
      responses:
        "500":
          description: Always returns a 500 fatal error for testing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                - error: "panic received: fatal error on input map[]"
                  input: {}
                  path: "rc/fatal"
                  status: 500
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /rc/panic:
    post:
      operationId: rc_panic
      tags:
        - RC
      summary: Trigger a panic (testing)
      description: >-
        Deliberately triggers a Go panic in the server process. WARNING: This will
        crash the rclone server if panic recovery is not enabled. Only use this for
        testing your monitoring and restart mechanisms. Do not call this in production.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /core/version:
    post:
      operationId: core_version
      tags:
        - Core
      summary: Get rclone version info
      description: >-
        Returns detailed version information about the running rclone instance,
        including the version string, OS, CPU architecture, and Go runtime version.
        Useful for verifying compatibility or logging the rclone version in your
        application.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionInfo"
              examples:
                - version: v1.73.2
                  decomposed:
                    - 1
                    - 73
                    - 2
                  isGit: false
                  isBeta: false
                  os: linux
                  arch: amd64
                  goVersion: go1.26.1
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /core/pid:
    post:
      operationId: core_pid
      tags:
        - Core
      summary: Get current process PID
      description: >-
        Returns the process ID (PID) of the running rclone server. Useful for
        process management, logging, or sending OS-level signals to the rclone
        process from your application.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  pid:
                    type: integer
                    examples:
                      - 1
              examples:
                - pid: 12345
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /core/memstats:
    post:
      operationId: core_memstats
      tags:
        - Core
      summary: Get Go memory statistics
      description: >-
        Returns detailed Go runtime memory statistics including heap allocation,
        garbage collection stats, and system memory usage. Useful for diagnosing
        memory issues or monitoring rclone resource consumption over time.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Go runtime memory statistics. See https://pkg.go.dev/runtime#MemStats for field details."
                properties:
                  Alloc:
                    type: integer
                    description: "Bytes of allocated heap objects."
                  HeapAlloc:
                    type: integer
                    description: "Bytes of allocated heap objects (same as Alloc)."
                  HeapSys:
                    type: integer
                    description: "Bytes of heap memory obtained from the OS."
                  Sys:
                    type: integer
                    description: "Total bytes of memory obtained from the OS."
                  TotalAlloc:
                    type: integer
                    description: "Cumulative bytes allocated for heap objects."
                additionalProperties:
                  type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /core/gc:
    post:
      operationId: core_gc
      tags:
        - Core
      summary: Run garbage collection
      description: >-
        Manually triggers Go runtime garbage collection to free unused memory.
        Normally Go handles this automatically, but you can call this after large
        transfers complete to reclaim memory sooner.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /core/du:
    post:
      operationId: core_du
      tags:
        - Core
      summary: Get disk usage
      description: >-
        Returns disk usage information for a local directory, including total space,
        free space, and available space in bytes. Only works with local filesystem
        paths, not remote backends.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                dir:
                  type: string
                  examples:
                    - /home/user
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  dir:
                    type: string
                    examples:
                      - "/"
                  info:
                    type: object
                    properties:
                      Available:
                        type: integer
                      Free:
                        type: integer
                      Total:
                        type: integer
              examples:
                - dir: /
                  info:
                    Available: 361769115648
                    Free: 361785892864
                    Total: 982141468672
  /core/bwlimit:
    post:
      operationId: core_bwlimit
      tags:
        - Core
      summary: Get or set bandwidth limit
      description: >-
        Query or set the global bandwidth limit for all transfers. If called without
        a rate parameter, returns the current limits. Supports separate upload and
        download limits using the upload:download syntax (e.g., "1M:500k"). Use
        "off" to remove limits entirely.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rate:
                  type: string
                  description: Bandwidth limit, e.g. '1M', '1M:100k', 'off'
                  examples:
                    - 1M:100k
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BandwidthLimit"
  /core/stats:
    post:
      operationId: core_stats
      tags:
        - Core
      summary: Get transfer statistics
      description: >-
        Returns comprehensive transfer statistics including speed, bytes transferred,
        error counts, and details of files currently being transferred. Optionally filter
        by stats group name, or use the short flag to return a condensed response.
        Poll this endpoint periodically to build a progress indicator.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                group:
                  type: string
                short:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferStats"
  /core/stats-reset:
    post:
      operationId: core_stats-reset
      tags:
        - Core
      summary: Reset transfer statistics
      description: >-
        Resets transfer statistics counters back to zero. Optionally specify a group
        name to reset only that group. Useful for getting clean stats before starting
        a new batch of transfers.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                group:
                  type: string
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
  /core/stats-delete:
    post:
      operationId: core_stats-delete
      tags:
        - Core
      summary: Delete a stats group
      description: >-
        Permanently deletes a specific stats group and all its accumulated statistics.
        Each async job creates its own stats group (e.g., "job/1"), so use this to
        clean up stats from completed jobs you no longer need to track.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                group:
                  type: string
              required:
                - group
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /core/transferred:
    post:
      operationId: core_transferred
      tags:
        - Core
      summary: Get completed transfers
      description: >-
        Returns a list of recently completed file transfers, including file names,
        sizes, bytes transferred, and any errors. Rclone keeps up to the last 100
        completed transfers. Optionally filter by stats group name.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                group:
                  type: string
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  transferred:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        size:
                          type: integer
                        bytes:
                          type: integer
                        error:
                          type: string
                        checked:
                          type: boolean
                        what:
                          type: string
                        timestamp:
                          type: integer
                        jobid:
                          type: integer
  /core/group-list:
    post:
      operationId: core_group-list
      tags:
        - Core
      summary: List stats groups
      description: >-
        Returns the names of all active stats groups. Stats groups are created
        automatically for async jobs (named "job/1", "job/2", etc.). Use these
        names with core/stats to get per-job transfer statistics.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    nullable: true
                    items:
                      type: string
              examples:
                - groups:
                    - job/1
                    - job/2
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /core/quit:
    post:
      operationId: core_quit
      tags:
        - Core
      summary: Quit rclone
      description: >-
        Gracefully shuts down the rclone process. Any active transfers will be
        cancelled. You can optionally specify an exit code. This is a destructive
        operation that will stop the RC server and all active mounts, serves,
        and transfers.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                exitCode:
                  type: integer
                  default: 0
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response. Process begins shutdown."
  /core/obscure:
    post:
      operationId: core_obscure
      tags:
        - Core
      summary: Obscure a password
      description: >-
        Obscures a plaintext password using rclone's built-in obscure algorithm.
        Many rclone remote configurations store passwords in obscured form. Use
        this before passing passwords to config/create or config/update. Note that
        obscuring is not encryption — it only prevents casual reading of passwords.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                clear:
                  type: string
                  examples:
                    - mypassword
              required:
                - clear
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  obscured:
                    type: string
                    examples:
                      - "U2FsdGVkX1..."
              examples:
                - obscured: U2FsdGVkX1...
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /core/command:
    post:
      operationId: core_command
      tags:
        - Core
      summary: Execute an rclone command
      description: >-
        Executes any rclone CLI command through the RC API, as if you ran it on
        the command line. Requires authentication. Use the returnType parameter to
        control whether output is returned as a combined string or streamed.
        This is a powerful escape hatch for commands not covered by other endpoints.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                command:
                  type: string
                  examples:
                    - ls
                arg:
                  type: array
                  items:
                    type: string
                  examples:
                    - remote:path
                opt:
                  type: object
                returnType:
                  type: string
                  enum:
                    - COMBINED_OUTPUT
                    - STREAM
                    - STREAM_ONLY_STDOUT
                    - STREAM_ONLY_STDERR
              required:
                - command
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    description: "Command output. Only set when using returnType COMBINED_OUTPUT."
                  error:
                    type: boolean
                    description: "True if the command exited with an error code."
                  returnType:
                    type: string
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /config/create:
    post:
      operationId: config_create
      tags:
        - Config
      summary: Create a new remote
      description: >-
        Creates a new remote configuration with the given name and type. Pass
        provider-specific parameters (like access keys, regions, or bucket names)
        in the parameters object. Set opt.nonInteractive to true when calling via
        the API to avoid prompts. If the remote name already exists, this will fail.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  examples:
                    - myremote
                type:
                  type: string
                  examples:
                    - s3
                parameters:
                  type: object
                  additionalProperties:
                    type: string
                opt:
                  type: object
                  properties:
                    obscure:
                      type: boolean
                    noObscure:
                      type: boolean
                    nonInteractive:
                      type: boolean
              required:
                - name
                - type
            example:
              name: my-s3
              type: s3
              parameters:
                provider: AWS
                access_key_id: AKIAIOSFODNN7EXAMPLE
                region: us-east-1
              opt:
                nonInteractive: true
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /config/update:
    post:
      operationId: config_update
      tags:
        - Config
      summary: Update an existing remote
      description: >-
        Updates the configuration of an existing remote. Only the parameters you
        specify will be changed; other settings remain untouched. The remote must
        already exist or the call will fail. Use config/get first to see the
        current configuration if needed.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                parameters:
                  type: object
                opt:
                  type: object
              required:
                - name
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /config/delete:
    post:
      operationId: config_delete
      tags:
        - Config
      summary: Delete a remote
      description: >-
        Permanently deletes a remote configuration by name. This only removes
        the remote from rclone's config file — it does not delete any files stored
        on the remote itself. This action cannot be undone.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  examples:
                    - myremote
              required:
                - name
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /config/get:
    post:
      operationId: config_get
      tags:
        - Config
      summary: Get a remote's config
      description: >-
        Returns the full configuration for a specific remote, including its type
        and all provider-specific parameters. Note that password fields are returned
        in obscured form. Returns an error if the remote does not exist.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  examples:
                    - myremote
              required:
                - name
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
              examples:
                - type: s3
                  provider: AWS
                  region: us-east-1
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /config/dump:
    post:
      operationId: config_dump
      tags:
        - Config
      summary: Dump all remote configs
      description: >-
        Returns the complete configuration for every remote in one response.
        Useful for backing up your rclone config or building a UI that shows
        all configured remotes. Password fields are returned in obscured form.
      security:
        - basicAuth: []
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  additionalProperties:
                    type: string
              examples:
                - my-s3:
                  type: s3
                  region: us-east-1
                - my-drive:
                  type: drive
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /config/listremotes:
    post:
      operationId: config_listremotes
      tags:
        - Config
      summary: List all remote names
      description: >-
        Returns an array containing just the names of all configured remotes,
        without their configuration details. Use this for a quick overview of
        available remotes, then call config/get for details on a specific one.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  remotes:
                    type: array
                    items:
                      type: string
              examples:
                - remotes:
                    - my-s3
                    - my-drive
                    - my-dropbox
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /config/password:
    post:
      operationId: config_password
      tags:
        - Config
      summary: Set password parameters
      description: >-
        Sets password-type parameters on a remote. The passwords you provide are
        automatically obscured before being stored, so you should pass them in
        plaintext. Use this instead of config/update when setting password fields
        to avoid double-obscuring.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                parameters:
                  type: object
              required:
                - name
                - parameters
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /config/paths:
    post:
      operationId: config_paths
      tags:
        - Config
      summary: Get config file paths
      description: >-
        Returns the filesystem paths that rclone uses for its configuration file,
        cache directory, and temporary files directory. Useful for locating the
        config file or understanding where rclone stores cached data on disk.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigPaths"
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /config/providers:
    post:
      operationId: config_providers
      tags:
        - Config
      summary: List available providers
      description: >-
        Returns a list of all storage providers (backends) that this rclone build
        supports, along with their configuration options and descriptions. Use this
        to dynamically build a remote creation form or to check which providers
        are available.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        Name:
                          type: string
                        Description:
                          type: string
                        Prefix:
                          type: string
                        Options:
                          type: array
                          items:
                            type: object
                        CommandHelp:
                          type: array
                          nullable: true
                          items:
                            type: object
                        Aliases:
                          type: array
                          nullable: true
                          items:
                            type: string
                        Hide:
                          type: integer
                        MetadataInfo:
                          type: object
                          nullable: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /config/setpath:
    post:
      operationId: config_setpath
      tags:
        - Config
      summary: Set config file path
      description: >-
        Changes which configuration file rclone uses. After calling this, all
        subsequent config operations will read from and write to the new path.
        The file at the new path must be a valid rclone config file or be empty
        for a fresh start.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
                  examples:
                    - /etc/rclone/rclone.conf
              required:
                - path
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /config/unlock:
    post:
      operationId: config_unlock
      tags:
        - Config
      summary: Unlock encrypted config
      description: >-
        Unlocks an encrypted rclone configuration file by providing the config
        password. If your config file is encrypted (set up via rclone config),
        you must call this before any config operations will work. The password
        is held in memory for the duration of the rclone session.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                configPassword:
                  type: string
              required:
                - configPassword
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /operations/list:
    post:
      operationId: operations_list
      tags:
        - Operations
      summary: List files and directories
      description: >-
        Lists files and directories at a given path on a remote. This is one of the
        most commonly used endpoints for browsing remote storage. Use the opt parameter
        to control recursion, include file hashes, filter for files or directories only,
        and retrieve metadata. The fs parameter specifies the remote (e.g., "drive:"),
        and remote specifies the path within it.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
                  examples:
                    - drive:documents
                remote:
                  type: string
                  examples:
                    - subfolder
                opt:
                  $ref: "#/components/schemas/ListOptions"
              required:
                - fs
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  list:
                    type: array
                    items:
                      $ref: "#/components/schemas/ListItem"
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /operations/stat:
    post:
      operationId: operations_stat
      tags:
        - Operations
      summary: Get file/directory info
      description: >-
        Returns metadata about a single file or directory, including name, size,
        modification time, and MIME type. Returns null for the item field if the
        path does not exist, rather than returning an error. Use this to check
        whether a specific file exists before attempting to download or modify it.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
                  examples:
                    - "drive:"
                remote:
                  type: string
                  examples:
                    - report.pdf
                opt:
                  $ref: "#/components/schemas/ListOptions"
              required:
                - fs
                - remote
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    $ref: "#/components/schemas/ListItem"
                    nullable: true
                    description: "File or directory info, or null if not found."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /operations/about:
    post:
      operationId: operations_about
      tags:
        - Operations
      summary: Get remote storage info
      description: >-
        Returns storage space information for a remote, including total capacity,
        used space, free space, and space consumed by trashed items (in bytes).
        Not all backends support every field — unsupported values may be absent
        from the response. Useful for monitoring storage quotas.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
                  examples:
                    - "drive:"
              required:
                - fs
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  used:
                    type: integer
                  free:
                    type: integer
                  trashed:
                    type: integer
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /operations/mkdir:
    post:
      operationId: operations_mkdir
      tags:
        - Operations
      summary: Create a directory
      description: >-
        Creates a directory at the specified path on the remote. Parent directories
        are created automatically if they do not exist. If the directory already
        exists, this operation succeeds without error.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
                  examples:
                    - "drive:"
                remote:
                  type: string
                  examples:
                    - new-folder
              required:
                - fs
                - remote
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /operations/rmdir:
    post:
      operationId: operations_rmdir
      tags:
        - Operations
      summary: Remove an empty directory
      description: >-
        Removes a single empty directory. This will fail with an error if the
        directory contains any files or subdirectories. Use operations/purge
        instead if you need to remove a directory and all its contents, or
        operations/rmdirs to clean up empty directories recursively.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
                remote:
                  type: string
              required:
                - fs
                - remote
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /operations/rmdirs:
    post:
      operationId: operations_rmdirs
      tags:
        - Operations
      summary: Remove empty directories recursively
      description: >-
        Recursively removes all empty directories under the specified path. Useful
        for cleaning up leftover empty folders after deleting or moving files. Set
        leaveRoot to true to keep the top-level directory itself while removing
        empty subdirectories beneath it.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
                remote:
                  type: string
                leaveRoot:
                  type: boolean
                  default: false
              required:
                - fs
                - remote
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /operations/purge:
    post:
      operationId: operations_purge
      tags:
        - Operations
      summary: Remove directory and all contents
      description: >-
        Recursively deletes a directory and all of its contents, including files
        and subdirectories. WARNING: This is a destructive operation that cannot
        be undone (unless the backend supports a trash/recycle bin). Double-check
        the path before calling this endpoint.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
                remote:
                  type: string
              required:
                - fs
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /operations/copyfile:
    post:
      operationId: operations_copyfile
      tags:
        - Operations
      summary: Copy a single file
      description: >-
        Copies a single file from one location to another, which can be on the
        same remote or across different remotes. The source file is not modified.
        If the destination file already exists, it will be overwritten. For copying
        entire directories, use sync/copy instead.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                srcFs:
                  type: string
                  examples:
                    - "drive:"
                srcRemote:
                  type: string
                  examples:
                    - file.txt
                dstFs:
                  type: string
                  examples:
                    - s3:bucket
                dstRemote:
                  type: string
                  examples:
                    - backup/file.txt
              required:
                - srcFs
                - srcRemote
                - dstFs
                - dstRemote
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /operations/movefile:
    post:
      operationId: operations_movefile
      tags:
        - Operations
      summary: Move a single file
      description: >-
        Moves a single file from one location to another by copying it to the
        destination and then deleting the source. Works across different remotes.
        If the destination file already exists, it will be overwritten. The source
        file is only deleted after a successful copy.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                srcFs:
                  type: string
                srcRemote:
                  type: string
                dstFs:
                  type: string
                dstRemote:
                  type: string
              required:
                - srcFs
                - srcRemote
                - dstFs
                - dstRemote
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /operations/copyurl:
    post:
      operationId: operations_copyurl
      tags:
        - Operations
      summary: Copy a URL to a remote
      description: >-
        Downloads a file from a public URL and saves it directly to a remote,
        without needing to download it locally first. Set autoFilename to true
        to automatically use the filename from the URL or Content-Disposition
        header. Useful for saving web resources directly to cloud storage.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
                remote:
                  type: string
                url:
                  type: string
                  examples:
                    - https://example.com/file.zip
                autoFilename:
                  type: boolean
                  default: false
              required:
                - fs
                - remote
                - url
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /operations/delete:
    post:
      operationId: operations_delete
      tags:
        - Operations
      summary: Delete files in a remote
      description: >-
        Removes all files within the specified path, but leaves the directory
        structure intact. WARNING: This is a destructive operation that permanently
        deletes files. To remove directories as well, use operations/purge. To
        delete a single specific file, use operations/deletefile instead.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
                  examples:
                    - drive:temp
              required:
                - fs
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /operations/deletefile:
    post:
      operationId: operations_deletefile
      tags:
        - Operations
      summary: Delete a single file
      description: >-
        Deletes a single specific file from a remote. Returns an error if the file
        does not exist. This is the safest way to delete files since it targets
        exactly one file, unlike operations/delete which removes all files in
        a path.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
                remote:
                  type: string
              required:
                - fs
                - remote
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /operations/cleanup:
    post:
      operationId: operations_cleanup
      tags:
        - Operations
      summary: Clean up remote trash
      description: >-
        Permanently removes trashed files and old versions from a remote, if the
        backend supports it (e.g., Google Drive trash, S3 versioned objects). This
        frees up storage space that trashed items were consuming. Not all backends
        support this operation — check operations/fsinfo to see if cleanup is available.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
                  examples:
                    - "drive:"
              required:
                - fs
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /operations/fsinfo:
    post:
      operationId: operations_fsinfo
      tags:
        - Operations
      summary: Get remote filesystem info
      description: >-
        Returns detailed information about a remote's capabilities, including
        supported features, available hash types, and metadata support. Use this
        to programmatically check what operations a remote supports before
        attempting them.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
                  examples:
                    - "drive:"
              required:
                - fs
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  Features:
                    type: object
                    description: "Map of feature names to boolean availability."
                    additionalProperties:
                      type: boolean
                  Hashes:
                    type: array
                    items:
                      type: string
                    examples: ["md5", "sha1", "crc32", "sha256"]
                  Name:
                    type: string
                    description: "Name of the remote as created."
                    examples:
                      - "local"
                  Precision:
                    type: integer
                    description: "Precision of timestamps in nanoseconds."
                  Root:
                    type: string
                    description: "Root path of the remote."
                    examples:
                      - "/"
                  String:
                    type: string
                    description: "Human-readable description of the remote."
                  MetadataInfo:
                    type: object
                    nullable: true
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /operations/size:
    post:
      operationId: operations_size
      tags:
        - Operations
      summary: Get total size of a remote
      description: >-
        Calculates the total number of files and total size in bytes for a remote
        path. This may take a while for large directories as it needs to walk the
        entire directory tree. Consider using _async=true for large remotes.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
                  examples:
                    - drive:documents
              required:
                - fs
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  bytes:
                    type: integer
                  sizeless:
                    type: integer
                    description: "Number of files with unknown size."
              examples:
                - count: 42
                  bytes: 104857600
                  sizeless: 0
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /operations/publiclink:
    post:
      operationId: operations_publiclink
      tags:
        - Operations
      summary: Create a public link
      description: >-
        Creates a publicly shareable link to a file or directory on the remote.
        Only works with backends that support public links (e.g., Google Drive,
        Dropbox). Set unlink to true to remove an existing public link. Optionally
        set an expiry duration for time-limited sharing.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
                remote:
                  type: string
                unlink:
                  type: boolean
                  default: false
                expire:
                  type: string
                  examples:
                    - 24h
              required:
                - fs
                - remote
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    examples:
                      - "https://drive.google.com/file/d/..."
              examples:
                - url: https://drive.google.com/file/d/...
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /operations/hashsum:
    post:
      operationId: operations_hashsum
      tags:
        - Operations
      summary: Calculate hash sums
      description: >-
        Calculates hash checksums for all files in the specified path. Supported
        hash types depend on the backend (e.g., MD5, SHA-1, SHA-256). Set download
        to true to hash by downloading file content when the backend does not
        natively provide hashes. Use base64 for base64-encoded output.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
                hashType:
                  type: string
                  enum:
                    - MD5
                    - SHA-1
                    - SHA-256
                download:
                  type: boolean
                  default: false
                base64:
                  type: boolean
                  default: false
              required:
                - fs
                - hashType
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  hashType:
                    type: string
                    examples:
                      - "md5"
                  hashsum:
                    type: array
                    items:
                      type: string
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /operations/hashsumfile:
    post:
      operationId: operations_hashsumfile
      tags:
        - Operations
      summary: Calculate hash for a file
      description: >-
        Calculates the hash checksum for a single file. Faster than operations/hashsum
        when you only need to verify one file. Set download to true if the backend
        does not natively provide hashes and you want rclone to download the file
        content to compute the hash locally.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
                remote:
                  type: string
                hashType:
                  type: string
                download:
                  type: boolean
                base64:
                  type: boolean
              required:
                - fs
                - remote
                - hashType
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  hash:
                    type: string
                  hashType:
                    type: string
                    examples:
                      - "md5"
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /operations/check:
    post:
      operationId: operations_check
      tags:
        - Operations
      summary: Check files between remotes
      description: >-
        Compares files between a source and destination remote to find differences.
        Reports files that are missing on either side, files that differ, and files
        that match. Use the boolean flags to control which categories are included
        in the output. Set oneWay to true to only check source against destination.
        Useful for verifying backup integrity.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                srcFs:
                  type: string
                dstFs:
                  type: string
                download:
                  type: boolean
                oneWay:
                  type: boolean
                combined:
                  type: boolean
                missingOnSrc:
                  type: boolean
                missingOnDst:
                  type: boolean
                match:
                  type: boolean
                differ:
                  type: boolean
                error:
                  type: boolean
              required:
                - srcFs
                - dstFs
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  status:
                    type: string
                    examples:
                      - "OK"
                  hashType:
                    type: string
                  combined:
                    type: array
                    items:
                      type: string
                  missingOnSrc:
                    type: array
                    items:
                      type: string
                  missingOnDst:
                    type: array
                    items:
                      type: string
                  match:
                    type: array
                    items:
                      type: string
                  differ:
                    type: array
                    items:
                      type: string
                  error:
                    type: array
                    items:
                      type: string
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /operations/settier:
    post:
      operationId: operations_settier
      tags:
        - Operations
      summary: Set storage tier for remote
      description: >-
        Changes the storage tier (storage class) for all files in the specified
        remote path. Only supported by backends that offer storage tiers, such
        as S3 (Standard, Glacier, etc.) or Azure Blob (Hot, Cool, Archive).
        This can affect access times and storage costs.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
              required:
                - fs
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /operations/settierfile:
    post:
      operationId: operations_settierfile
      tags:
        - Operations
      summary: Set storage tier for a file
      description: >-
        Changes the storage tier (storage class) for a single file. Use this
        for targeted tier changes on individual files instead of changing the
        tier for an entire directory. Only supported by backends that offer
        storage tiers (e.g., S3, Azure Blob).
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
                remote:
                  type: string
              required:
                - fs
                - remote
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /operations/uploadfile:
    post:
      operationId: operations_uploadfile
      tags:
        - Operations
      summary: Upload a file
      description: >-
        Uploads a file to a remote using multipart form data. This is the only
        endpoint that accepts multipart/form-data instead of JSON. The file is
        uploaded directly to the specified remote path. For uploading multiple
        files or entire directories, use sync/copy instead.
      security:
        - basicAuth: []
      parameters:
        - name: fs
          in: query
          required: true
          schema:
            type: string
          description: The remote to upload to (e.g. "drive:").
        - name: remote
          in: query
          required: true
          schema:
            type: string
          description: The path to upload the file to.
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: File uploaded.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /sync/copy:
    post:
      operationId: sync_copy
      tags:
        - Sync
      summary: Copy files between remotes
      description: >-
        Copies all files from the source remote to the destination remote, skipping
        files that already exist and are unchanged at the destination. Does not delete
        any files on the destination. This is typically a long-running operation, so
        use _async=true and monitor progress via job/status and core/stats.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                srcFs:
                  type: string
                  examples:
                    - drive:documents
                dstFs:
                  type: string
                  examples:
                    - s3:backup
                createEmptySrcDirs:
                  type: boolean
                  default: false
                _async:
                  type: boolean
                  default: false
              required:
                - srcFs
                - dstFs
            example:
              srcFs: drive:documents
              dstFs: s3:backup
              _async: true
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success. When called with _async=true, returns jobid and executeId instead."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /sync/move:
    post:
      operationId: sync_move
      tags:
        - Sync
      summary: Move files between remotes
      description: >-
        Moves all files from the source remote to the destination remote. Files are
        copied to the destination and then deleted from the source. Source files are
        only deleted after successful transfer. Use _async=true for large transfers
        and set deleteEmptySrcDirs to also remove empty source directories afterward.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                srcFs:
                  type: string
                dstFs:
                  type: string
                createEmptySrcDirs:
                  type: boolean
                deleteEmptySrcDirs:
                  type: boolean
                _async:
                  type: boolean
              required:
                - srcFs
                - dstFs
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success. When called with _async=true, returns jobid and executeId instead."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /sync/sync:
    post:
      operationId: sync_sync
      tags:
        - Sync
      summary: Sync destination to match source
      description: >-
        Makes the destination an exact mirror of the source by copying new and
        changed files, and deleting files on the destination that do not exist on
        the source. WARNING: This is destructive — extra files on the destination
        will be permanently deleted. Use _async=true for large syncs and consider
        a dry run first via core/command.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                srcFs:
                  type: string
                  examples:
                    - drive:master
                dstFs:
                  type: string
                  examples:
                    - s3:mirror
                createEmptySrcDirs:
                  type: boolean
                _async:
                  type: boolean
              required:
                - srcFs
                - dstFs
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success. When called with _async=true, returns jobid and executeId instead."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /sync/bisync:
    post:
      operationId: sync_bisync
      tags:
        - Sync
      summary: Bidirectional sync
      description: >-
        Performs bidirectional synchronization between two paths, propagating changes
        made on either side to the other. On first run, use resync=true to establish
        a baseline. The maxDelete parameter (default 50%) prevents accidental mass
        deletions — set force=true to override this safety limit. Use checkAccess
        to verify both sides are accessible before syncing. Bisync is more complex
        than one-way sync and requires careful configuration.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                path1:
                  type: string
                  examples:
                    - drive:sync
                path2:
                  type: string
                  examples:
                    - /local/sync
                dryRun:
                  type: boolean
                resync:
                  type: boolean
                checkAccess:
                  type: boolean
                maxDelete:
                  type: integer
                  default: 50
                force:
                  type: boolean
                createEmptySrcDirs:
                  type: boolean
                removeEmptyDirs:
                  type: boolean
                resilient:
                  type: boolean
                noCleanup:
                  type: boolean
                _async:
                  type: boolean
              required:
                - path1
                - path2
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success. When called with _async=true, returns jobid and executeId instead."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /mount/mount:
    post:
      operationId: mount_mount
      tags:
        - Mount
      summary: Mount a remote
      description: >-
        Mounts a remote filesystem to a local directory via FUSE, making remote
        files accessible as if they were local. The mount point directory must
        already exist and be empty. Configure VFS cache settings via vfsOpt for
        better performance with applications that need random access. Requires
        FUSE to be installed on the host system.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
                  examples:
                    - "drive:"
                mountPoint:
                  type: string
                  examples:
                    - /mnt/drive
                mountType:
                  type: string
                  enum:
                    - mount
                    - cmount
                    - mount2
                mountOpt:
                  $ref: "#/components/schemas/MountOptions"
                vfsOpt:
                  $ref: "#/components/schemas/VfsOptions"
              required:
                - fs
                - mountPoint
            example:
              fs: "drive:"
              mountPoint: /mnt/drive
              vfsOpt:
                CacheMode: 3
              mountOpt:
                AllowOther: true
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /mount/unmount:
    post:
      operationId: mount_unmount
      tags:
        - Mount
      summary: Unmount a mount point
      description: >-
        Unmounts a previously mounted remote filesystem by its mount point path.
        Any pending VFS cache uploads will be flushed before unmounting. If
        processes are actively using the mount point, the unmount may fail.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                mountPoint:
                  type: string
                  examples:
                    - /mnt/drive
              required:
                - mountPoint
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /mount/unmountall:
    post:
      operationId: mount_unmountall
      tags:
        - Mount
      summary: Unmount all mount points
      description: >-
        Unmounts all currently mounted remote filesystems at once. Useful for
        cleanup before shutting down the rclone server. All pending VFS cache
        uploads will be flushed before unmounting each mount point.
      security:
        - basicAuth: []
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /mount/listmounts:
    post:
      operationId: mount_listmounts
      tags:
        - Mount
      summary: List active mounts
      description: >-
        Returns a list of all currently active mount points, including which remote
        is mounted where and when each mount was created. Use this to check the
        status of your mounts or find the mount point path needed for unmounting.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mountPoints:
                    type: array
                    items:
                      type: object
                      properties:
                        Fs:
                          type: string
                        MountPoint:
                          type: string
                        MountedOn:
                          type: string
                          format: date-time
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /mount/types:
    post:
      operationId: mount_types
      tags:
        - Mount
      summary: List mount types
      description: >-
        Returns the list of mount implementation types available on this system
        (e.g., mount, cmount, mount2). Available types depend on the OS and how
        rclone was built. Use this to check which mount types you can pass to
        mount/mount.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mountTypes:
                    type: array
                    items:
                      type: string
              examples:
                - mountTypes:
                    - mount
                    - cmount
                    - mount2
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /vfs/refresh:
    post:
      operationId: vfs_refresh
      tags:
        - VFS
      summary: Refresh VFS directory cache
      description: >-
        Refreshes the VFS directory listing cache, forcing rclone to re-read
        directory contents from the remote. Use this when files have been added or
        changed externally (outside of rclone) and you need the mounted filesystem
        to reflect those changes immediately. Set recursive to true to refresh
        all subdirectories as well.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
                dir:
                  type: string
                recursive:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success, or map of refreshed paths with result strings."
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /vfs/forget:
    post:
      operationId: vfs_forget
      tags:
        - VFS
      summary: Forget VFS cache entries
      description: >-
        Removes specific files or directories from the VFS cache, forcing them
        to be re-fetched from the remote on next access. Use this to free up local
        disk space used by cached files, or to force a re-download of a file that
        may have changed on the remote.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
                file:
                  type: string
                dir:
                  type: string
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success, or map of refreshed paths with result strings."
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /vfs/list:
    post:
      operationId: vfs_list
      tags:
        - VFS
      summary: List active VFS instances
      description: >-
        Returns a list of all active VFS instances. Each mount or serve operation
        creates its own VFS instance. Use the returned identifiers with other
        vfs/* endpoints to target a specific VFS instance.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  vfses:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /vfs/stats:
    post:
      operationId: vfs_stats
      tags:
        - VFS
      summary: Get VFS statistics
      description: >-
        Returns statistics for a VFS instance, including disk cache usage, metadata
        cache state, and the current VFS options in effect. Useful for monitoring
        cache disk space consumption and diagnosing caching behavior.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  diskCache:
                    type: object
                  metadataCache:
                    type: object
                  opt:
                    $ref: "#/components/schemas/VfsOptions"
  /vfs/poll-interval:
    post:
      operationId: vfs_poll-interval
      tags:
        - VFS
      summary: Set VFS poll interval
      description: >-
        Gets or sets the poll interval that controls how frequently rclone checks
        the remote for changes. A shorter interval means faster detection of
        external changes but increases API calls to the remote. If called without
        parameters, returns the current interval.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
                interval:
                  type: string
                  examples:
                    - 1m
                timeout:
                  type: string
                  examples:
                    - 30s
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
  /vfs/queue:
    post:
      operationId: vfs_queue
      tags:
        - VFS
      summary: Get VFS upload queue
      description: >-
        Returns the list of files waiting to be uploaded to the remote from the
        VFS write-back cache. Each item shows the file name, size, number of
        retry attempts, and whether it is currently uploading. Useful for monitoring
        pending writes when using VFS cache in writes or full mode.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    id:
                      type: integer
                    size:
                      type: integer
                    tries:
                      type: integer
                    uploading:
                      type: boolean
                    expiry:
                      type: number
                      description: "Seconds until file is eligible for transfer."
                    delay:
                      type: number
                      description: "Seconds between upload attempts."
  /vfs/queue-set-expiry:
    post:
      operationId: vfs_queue-set-expiry
      tags:
        - VFS
      summary: Set expiry for queued upload
      description: >-
        Sets or changes the expiry time for a file in the VFS upload queue. Use
        this to prioritize or delay specific uploads. The expiry value is a Unix
        timestamp, or set relative to true to interpret the value as seconds from
        now. The item ID can be found via vfs/queue.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fs:
                  type: string
                id:
                  type: integer
                expiry:
                  type: number
                relative:
                  type: boolean
              required:
                - id
                - expiry
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /job/list:
    post:
      operationId: job_list
      tags:
        - Job
      summary: List all jobs
      description: >-
        Returns a list of all async jobs, including their IDs, which are still
        running, and which have finished. Jobs are created when you pass _async=true
        to any endpoint. Use the returned job IDs with job/status to check progress
        or job/stop to cancel a running job.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  executeId:
                    type: string
                    examples:
                      - "d794c33c-463e-4acf-b911-f4b23e4f40b7"
                  jobids:
                    type: array
                    items:
                      type: integer
                  runningIds:
                    type: array
                    items:
                      type: integer
                  finishedIds:
                    type: array
                    items:
                      type: integer
              example:
                executeId: "d794c33c-463e-4acf-b911-f4b23e4f40b7"
                jobids:
                  - 1
                  - 2
                  - 3
                runningIds:
                  - 3
                finishedIds:
                  - 1
                  - 2
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /job/status:
    post:
      operationId: job_status
      tags:
        - Job
      summary: Get job status
      description: >-
        Returns the current status of an async job, including whether it has
        finished, how long it has been running, and whether it succeeded or
        encountered errors. Poll this endpoint periodically to track the progress
        of long-running operations like sync or copy.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                jobid:
                  type: integer
                  examples:
                    - 1
              required:
                - jobid
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatus"
              example:
                finished: true
                duration: 45.2
                id: 1
                success: true
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /job/stop:
    post:
      operationId: job_stop
      tags:
        - Job
      summary: Stop a running job
      description: >-
        Cancels a running async job by its ID. The job will be stopped as soon as
        possible, but files already in the process of transferring may complete
        first. Use job/list to find the ID of the job you want to stop.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                jobid:
                  type: integer
              required:
                - jobid
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /job/stopgroup:
    post:
      operationId: job_stopgroup
      tags:
        - Job
      summary: Stop all jobs in a group
      description: >-
        Cancels all running async jobs that belong to a specific stats group.
        Stats groups are named like "job/1", "job/2", etc. Use core/group-list
        to see available group names. Useful for cancelling a batch of related
        operations at once.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                group:
                  type: string
              required:
                - group
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /job/batch:
    post:
      operationId: job_batch
      tags:
        - Job
      summary: Execute batch commands
      description: >-
        Executes multiple RC commands in a single HTTP request. Each input item
        specifies a _path (the RC endpoint) and any parameters for that call.
        Use the concurrency parameter to control how many commands run in parallel.
        This reduces network round trips when you need to call several endpoints.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                concurrency:
                  type: integer
                  examples:
                    - 4
                inputs:
                  type: array
                  items:
                    type: object
                    required:
                      - _path
                    properties:
                      _path:
                        type: string
                    additionalProperties: true
              required:
                - inputs
            example:
              inputs:
                - _path: rc/noop
                  msg: hello
                - _path: core/version
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      description: "Result from each command, or error object if command failed."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /serve/start:
    post:
      operationId: serve_start
      tags:
        - Serve
      summary: Start a file server
      description: >-
        Starts a file server that exposes a remote over a specified protocol (HTTP,
        WebDAV, FTP, SFTP, NFS, DLNA, or S3). The server runs in the background
        and is assigned a unique ID that you can use with serve/stop to shut it down.
        Set the addr parameter to control which address and port the server listens on.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum:
                    - http
                    - webdav
                    - ftp
                    - sftp
                    - nfs
                    - dlna
                    - s3
                fs:
                  type: string
                  examples:
                    - "drive:"
                addr:
                  type: string
                  examples:
                    - :8080
                vfs_cache_mode:
                  type: string
                  enum:
                    - off
                    - minimal
                    - writes
                    - full
              required:
                - type
                - fs
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServeInfo"
              examples:
                - addr: "[::]:4321"
                  id: nfs-ecfc6852
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /serve/stop:
    post:
      operationId: serve_stop
      tags:
        - Serve
      summary: Stop a file server
      description: >-
        Stops a running file server by its unique ID (returned by serve/start or
        visible in serve/list). The server will stop accepting new connections
        and shut down gracefully.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  examples:
                    - nfs-ecfc6852
              required:
                - id
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /serve/stopall:
    post:
      operationId: serve_stopall
      tags:
        - Serve
      summary: Stop all file servers
      description: >-
        Stops all running file servers at once. Useful for cleanup before shutting
        down the rclone process or when you need to restart all servers with new
        configurations.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /serve/list:
    post:
      operationId: serve_list
      tags:
        - Serve
      summary: List running servers
      description: >-
        Returns a list of all currently running file servers, including their IDs,
        listening addresses, and configuration parameters. Use the server ID from
        this list with serve/stop to shut down a specific server.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  list:
                    type: array
                    items:
                      $ref: "#/components/schemas/ServeInfo"
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /serve/types:
    post:
      operationId: serve_types
      tags:
        - Serve
      summary: List server types
      description: >-
        Returns the list of file serving protocol types available on this rclone
        build (e.g., http, webdav, ftp, sftp, nfs, dlna, s3). Use this to check
        which protocols you can pass to serve/start.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  types:
                    type: array
                    items:
                      type: string
              example:
                types:
                  - http
                  - webdav
                  - ftp
                  - sftp
                  - nfs
                  - dlna
                  - s3
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /options/get:
    post:
      operationId: options_get
      tags:
        - Options
      summary: Get current options
      description: >-
        Returns the current values of all global rclone options, or only specific
        option blocks if you provide a comma-separated list of block names. Use
        options/blocks to discover available block names. Useful for inspecting
        the current runtime configuration.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                blocks:
                  type: string
                  examples:
                    - main,filter
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Map of option block names to their current values."
                additionalProperties:
                  type: object
  /options/set:
    post:
      operationId: options_set
      tags:
        - Options
      summary: Set global options
      description: >-
        Sets global rclone options at runtime without restarting the server. Pass
        option blocks as keys with their values as nested objects. Changes take
        effect immediately for subsequent operations. Use options/get first to
        see the current values and expected structure.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /options/info:
    post:
      operationId: options_info
      tags:
        - Options
      summary: Get option metadata
      description: >-
        Returns metadata about all available options as arrays of Option
        blocks. Each Option block describes a single configuration flag,
        including its name, type, default value, help text, validation
        constraints, and predefined example values. Use this to build
        dynamic configuration UIs or to understand what each option does
        before changing it with options/set. Also see config/providers for
        backend-specific option metadata in the same format.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                blocks:
                  type: string
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: >-
                  Map of option block names (e.g. "main", "filter", "rc") to
                  arrays of Option metadata objects. Each Option describes a
                  single configuration flag.
                additionalProperties:
                  type: array
                  items:
                    $ref: "#/components/schemas/OptionInfo"
  /options/blocks:
    post:
      operationId: options_blocks
      tags:
        - Options
      summary: List option blocks
      description: >-
        Returns the names of all available option blocks (e.g., "main", "filter",
        "rc"). These block names can be passed to options/get, options/set, and
        options/info to work with specific groups of options rather than all
        options at once.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  options:
                    type: array
                    items:
                      type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /options/local:
    post:
      operationId: options_local
      tags:
        - Options
      summary: Get local options
      description: >-
        Returns the local (connection-specific) config and filter options that may
        override global settings. Use this to check if any per-connection overrides
        are active, which is helpful for debugging unexpected behavior in filtered
        operations.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    type: object
                  filter:
                    type: object
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /cache/expire:
    post:
      operationId: cache_expire
      tags:
        - Cache
      summary: Expire cache entries
      description: >-
        Expires cached entries for a specific path in the cache backend, forcing
        them to be re-fetched from the underlying remote on next access. Set
        withData to true to also delete the cached data files, not just the
        metadata. Only applies to the cache remote type.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                remote:
                  type: string
                  examples:
                    - path/to/folder/
                withData:
                  type: boolean
                  default: false
              required:
                - remote
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cache/fetch:
    post:
      operationId: cache_fetch
      tags:
        - Cache
      summary: Fetch cache chunks
      description: >-
        Pre-fetches file chunks into the local cache so they are available for
        fast access later. The chunks parameter specifies which byte ranges to
        fetch (e.g., ":5" for the first 5 chunks, "-5:" for the last 5). Only
        applies to the cache remote type.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                chunks:
                  type: string
                  examples:
                    - ":5,-5:"
                file:
                  type: string
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cache/stats:
    post:
      operationId: cache_stats
      tags:
        - Cache
      summary: Get cache statistics
      description: >-
        Returns statistics for the cache backend, including cache hit/miss rates,
        storage usage, and other performance metrics. Only applies to the cache
        remote type. Useful for monitoring cache effectiveness and tuning cache
        settings.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /backend/command:
    post:
      operationId: backend_command
      tags:
        - Backend
      summary: Execute a backend command
      description: >-
        Executes a command specific to the backend type of a remote. Available
        commands vary by backend — for example, Google Drive supports "get" to
        download by ID, and S3 supports "versioning" to manage object versions.
        The fs parameter specifies which remote to run the command against.
        Use "noop" as the command to test connectivity.
      security:
        - basicAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                command:
                  type: string
                  examples:
                    - noop
                fs:
                  type: string
                  examples:
                    - "drive:"
                arg:
                  type: array
                  items:
                    type: string
                opt:
                  type: object
                  additionalProperties:
                    type: string
              required:
                - command
                - fs
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    description: "Result from the backend command."
              examples:
                - result:
                    arg:
                      - path1
                    name: noop
                    opt:
                      echo: yes
        "403":
          description: Authentication required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /fscache/clear:
    post:
      operationId: fscache_clear
      tags:
        - FsCache
      summary: Clear filesystem cache
      description: >-
        Clears the internal filesystem object cache, forcing rclone to re-create
        filesystem objects on next use. This can help resolve stale connection
        issues or force rclone to pick up configuration changes for a remote
        without restarting.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /fscache/entries:
    post:
      operationId: fscache_entries
      tags:
        - FsCache
      summary: Get cache entry count
      description: >-
        Returns the number of filesystem objects currently held in the internal
        cache. A high number may indicate many remotes have been accessed. Use
        fscache/clear to reset the cache if needed.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: integer
              examples:
                - entries: 5
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /pluginsctl/addPlugin:
    post:
      operationId: pluginsctl_addPlugin
      tags:
        - Plugins
      summary: Add a plugin
      description: >-
        Installs a web GUI plugin from a GitHub repository URL. The plugin will
        be downloaded and made available in the rclone web interface. Only works
        when the web GUI is enabled (--rc-web-gui flag).
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  examples:
                    - https://github.com/user/plugin
              required:
                - url
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                description: "Empty response on success."
        "400":
          description: Missing required parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BadRequestResponse"
        "500":
          description: Error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /pluginsctl/listPlugins:
    post:
      operationId: pluginsctl_listPlugins
      tags:
        - Plugins
      summary: List plugins
      description: >-
        Returns all installed plugins, separated into production (loaded) plugins
        and test plugins. Each plugin entry includes its metadata such as name,
        type, and configuration. Use this to see what plugins are currently
        available in the web GUI.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  loadedPlugins:
                    type: object
                    description: "Map of loaded production plugins."
                  testPlugins:
                    type: object
                    description: "Map of loaded test plugins."
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /pluginsctl/getPluginsForType:
    post:
      operationId: pluginsctl_getPluginsForType
      tags:
        - Plugins
      summary: Get plugins for a type
      description: >-
        Returns plugins that can handle a specific MIME type or plugin type. For
        example, pass type "video/mp4" to find plugins that handle MP4 files, or
        pass pluginType "DASHBOARD" to find dashboard plugins. Useful for
        dynamically selecting the right plugin for a given file or context.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  examples:
                    - video/mp4
                pluginType:
                  type: string
                  enum:
                    - DASHBOARD
                    - FILE_HANDLER
                    - TERMINAL
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  loadedPlugins:
                    type: object
                  testPlugins:
                    type: object
  /pluginsctl/listTestPlugins:
    post:
      operationId: pluginsctl_listTestPlugins
      tags:
        - Plugins
      summary: List test plugins
      description: >-
        Returns only the test plugins that are currently loaded. Test plugins are
        plugins installed in development/testing mode, separate from production
        plugins. Use this to verify which test plugins are active.
      responses:
        "200":
          description: Success.
          content:
            application/json:
              schema:
                type: object
                properties:
                  loadedTestPlugins:
                    type: object
                    description: "Map of loaded test plugins."
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:

  /pluginsctl/removePlugin:
